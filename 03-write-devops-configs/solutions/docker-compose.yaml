services:
  web:
    image: nginx:1.27
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      APP_ENV: production

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
